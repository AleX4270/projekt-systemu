services:
    traefik:
        image: traefik:v3.6.7
        restart: unless-stopped
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:rw
        command:
            - "--providers.docker=true"
            - "--providers.docker.exposedByDefault=false"
            - "--api.insecure=true"
            - "--entrypoints.web.address=:80"
        ports:
            - "80:80"
            - "8080:8080"
        networks:
            - system-project-network
    frontend:
        image: node:25-alpine
        restart: unless-stopped
        working_dir: /app
        volumes:
            - ./frontend:/app:rw
            - node_modules:/app/node_modules
        command: sh -c "npm install && npm start -- --host 0.0.0.0"
        networks:
            - system-project-network
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
            - "traefik.http.routers.frontend.entrypoints=web"
            - "traefik.http.services.frontend.loadbalancer.server.port=4200"
    backend:
        build:
            context: .
            dockerfile: backend/Dockerfile.dev
        restart: unless-stopped
        volumes:
            - ./backend:/var/www/html:rw
            - backend-vendor:/var/www/html/vendor
        depends_on:
            - database
        networks:
            - system-project-network
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
            - "traefik.http.routers.backend.entrypoints=web"
            - "traefik.http.services.backend.loadbalancer.server.port=80"
    database:
        volumes:
            - ./docker/database/init-testing-database.sh:/docker-entrypoint-initdb.d/init-testing-database.sh
        ports:
         - "5432:5432"
        environment:
            - POSTGRES_HOST_AUTH_METHOD=trust

volumes:
    backend-vendor:

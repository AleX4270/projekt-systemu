name: Build and Deploy to Prod

on:
    push:
        branches: 
            - main
    
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_OWNER: alex4270
    BACKEND_IMAGE: system-project-backend
    FRONTEND_IMAGE: system-project-frontend

jobs:
    build-backend:
        runs-on: ubuntu-latest
        
        permissions:
            contents: read
            packages: write
        
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with: 
                registry: ${{env.REGISTRY}}
                username: ${{github.actor}}
                password: ${{secrets.GITHUB_TOKEN}}

            - name: Build and push backend image
              uses: docker/build-push-action@v6
              with:
                context: .
                file: ./backend/Dockerfile
                platforms: linux/amd64
                push: true
                tags: |
                    ${{env.REGISTRY}}/${{env.IMAGE_OWNER}}/${{env.BACKEND_IMAGE}}:latest
                    ${{env.REGISTRY}}/${{env.IMAGE_OWNER}}/${{env.BACKEND_IMAGE}}:${{github.sha}}
                cache-from: type=gha
                cache-to: type=gha,mode=max

    build-frontend:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with: 
                registry: ${{env.REGISTRY}}
                username: ${{github.actor}}
                password: ${{secrets.GITHUB_TOKEN}}

            - name: Build and push frontend image
              uses: docker/build-push-action@v6
              with:
                context: .
                file: ./frontend/Dockerfile
                platforms: linux/amd64
                push: true
                tags: |
                    ${{env.REGISTRY}}/${{env.IMAGE_OWNER}}/${{env.FRONTEND_IMAGE}}:latest
                    ${{env.REGISTRY}}/${{env.IMAGE_OWNER}}/${{env.FRONTEND_IMAGE}}:${{github.sha}}
                cache-from: type=gha
                cache-to: type=gha,mode=max

    deploy:
        runs-on: ubuntu-latest
        needs: [build-backend, build-frontend]

        steps:
            - name: Deploy to production (ssh)
              uses: appleboy/ssh-action@v1
              with: 
                host: ${{secrets.SSH_HOST}}
                username: ${{secrets.SSH_USERNAME}}
                key: ${{secrets.SSH_PRIVATE_KEY}}
                port: ${{secrets.SSH_PORT}}
                script: |
                    set -e
                    cd /var/www/system-project

                    echo "${{secrets.GITHUB_TOKEN}}" | docker login ghcr.io -u ${{github.actor}} --password-stdin

                    export BACKEND_TAG=${{github.sha}}
                    export FRONTEND_TAG=${{github.sha}}

                    docker compose -f compose.yaml -f compose.prod.yaml pull

                    docker compose -f compose.yaml -f compose.prod.yaml up -d --remove-orphans

                    docker image prune -f
